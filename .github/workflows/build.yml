name: Build RMK firmware
on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  build:
    uses: haobogu/rmk/.github/workflows/user_build.yml@main
    matrix:
      name: [Rugby_League_NRF52840, Rugby_League_ESP32S3]
    with:
      keyboard_toml_path: "${{ matrix.name }}/keyboard.toml"
      vial_json_path: "${{ matrix.name }}/vial.json"
